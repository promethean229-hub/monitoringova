<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аналіз графіка теплових процесів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone {
            transition: all 0.3s ease;
            border: 2px dashed #cbd5e1;
            background-color: rgba(255, 255, 255, 0.8);
            z-index: 10;
        }
        .drop-zone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.05);
        }
        .draggable {
            cursor: grab;
            user-select: none;
            touch-action: none; /* Запобігає скролу під час перетягування */
            z-index: 50;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
        }
        
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1e293b;
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        @media (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }

        /* Стиль для картки, яку тягнуть пальцем */
        .dragging-touch {
            pointer-events: none !important;
            opacity: 0.8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans overflow-x-hidden">

    <div id="orientation-warning">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5h6" />
        </svg>
        <h2 class="text-xl font-bold">Будь ласка, поверніть пристрій</h2>
        <p class="mt-2">Для роботи з графіком використовуйте горизонтальну орієнтацію.</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white min-h-screen md:min-h-0 md:rounded-2xl shadow-xl p-4 md:p-6">
        <header class="text-center mb-4">
            <h1 class="text-xl md:text-2xl font-bold text-slate-800">Аналіз фазових переходів</h1>
            <p class="text-slate-600 text-xs md:text-sm">Перетягніть процес на відповідну ділянку графіка</p>
        </header>

        <div class="relative flex justify-center mb-6">
            <div class="relative inline-block border rounded-lg p-2 bg-slate-50">
                <svg width="600" height="300" viewBox="0 0 600 300" class="max-w-full h-auto" id="main-svg">
                    <!-- Осі -->
                    <line x1="50" y1="260" x2="560" y2="260" stroke="#334155" stroke-width="2" />
                    <line x1="50" y1="260" x2="50" y2="20" stroke="#334155" stroke-width="2" />
                    
                    <!-- Лінії графіка -->
                    <path d="M 50 260 L 100 90 L 180 90 L 280 40 L 400 90 L 500 90 L 550 260" fill="none" stroke="#3b82f6" stroke-width="3" />
                    
                    <!-- Точки -->
                    <g fill="#1e293b">
                        <circle cx="100" cy="90" r="4" /><text x="95" y="80" font-weight="bold">A</text>
                        <circle cx="180" cy="90" r="4" /><text x="175" y="80" font-weight="bold">B</text>
                        <circle cx="280" cy="40" r="4" /><text x="275" y="30" font-weight="bold">C</text>
                        <circle cx="400" cy="90" r="4" /><text x="395" y="80" font-weight="bold">D</text>
                        <circle cx="500" cy="90" r="4" /><text x="495" y="80" font-weight="bold">E</text>
                    </g>
                </svg>

                <!-- Зони скидання -->
                <div id="zone-1" data-id="1" class="drop-zone absolute rounded flex items-center justify-center text-[10px] text-center p-1" style="left: 55px; top: 120px; width: 50px; height: 100px;">0-A</div>
                <div id="zone-2" data-id="2" class="drop-zone absolute rounded flex items-center justify-center text-[10px] text-center p-1" style="left: 110px; top: 60px; width: 70px; height: 35px;">A-B</div>
                <div id="zone-3" data-id="3" class="drop-zone absolute rounded flex items-center justify-center text-[10px] text-center p-1" style="left: 195px; top: 40px; width: 70px; height: 40px;">B-C</div>
                <div id="zone-4" data-id="4" class="drop-zone absolute rounded flex items-center justify-center text-[10px] text-center p-1" style="left: 300px; top: 40px; width: 80px; height: 40px;">C-D</div>
                <div id="zone-5" data-id="5" class="drop-zone absolute rounded flex items-center justify-center text-[10px] text-center p-1" style="left: 410px; top: 60px; width: 80px; height: 35px;">D-E</div>
                <div id="zone-6" data-id="6" class="drop-zone absolute rounded flex items-center justify-center text-[10px] text-center p-1" style="left: 510px; top: 110px; width: 50px; height: 110px;">E...</div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4 mb-6" id="cards-container"></div>

        <div class="flex justify-between items-center border-t pt-4">
            <button id="reset-btn" class="px-6 py-2 bg-slate-200 text-slate-700 rounded-lg font-medium hover:bg-slate-300 transition">Очистити</button>
            <div id="feedback" class="font-bold text-lg"></div>
            <button id="check-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-md hover:bg-blue-700 transition">Перевірити</button>
        </div>
    </div>

    <script>
        const data = [
            { id: "1", text: "Нагрівання льоду", label: "0-A" },
            { id: "2", text: "Плавлення льоду", label: "A-B" },
            { id: "3", text: "Нагрівання води", label: "B-C" },
            { id: "4", text: "Охолодження води", label: "C-D" },
            { id: "5", text: "Кристалізація", label: "D-E" },
            { id: "6", text: "Охолодження льоду", label: "E..." }
        ];

        const cardsContainer = document.getElementById('cards-container');
        const dropZones = document.querySelectorAll('.drop-zone');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const feedback = document.getElementById('feedback');

        let draggedItem = null;

        function init() {
            const shuffled = [...data].sort(() => Math.random() - 0.5);
            cardsContainer.innerHTML = '';
            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.className = 'draggable bg-white border-2 border-blue-200 p-2 md:p-3 rounded-xl shadow-sm text-xs md:text-sm text-center font-semibold transition-all';
                card.draggable = true;
                card.innerText = item.text;
                card.dataset.id = item.id;
                
                // Desktop Drag
                card.addEventListener('dragstart', (e) => {
                    draggedItem = card;
                    setTimeout(() => card.classList.add('opacity-0'), 0);
                });
                card.addEventListener('dragend', () => {
                    card.classList.remove('opacity-0');
                    draggedItem = null;
                });

                // Touch Events
                card.addEventListener('touchstart', handleTouchStart, {passive: false});
                card.addEventListener('touchmove', handleTouchMove, {passive: false});
                card.addEventListener('touchend', handleTouchEnd);

                cardsContainer.appendChild(card);
            });

            dropZones.forEach(zone => {
                zone.innerHTML = data.find(d => d.id === zone.dataset.id).label;
                zone.classList.remove('active');
            });
            feedback.innerText = '';
        }

        // Desktop Drop Logic
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('active');
            });
            zone.addEventListener('dragleave', () => zone.classList.remove('active'));
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('active');
                if (draggedItem) placeCard(zone, draggedItem);
            });
        });

        function placeCard(zone, card) {
            // Відновлення тексту в попередній зоні, якщо картку перемістили з однієї зони в іншу
            if (card.parentElement.classList.contains('drop-zone')) {
                const oldZone = card.parentElement;
                oldZone.innerText = data.find(d => d.id === oldZone.dataset.id).label;
            }

            zone.innerHTML = '';
            card.style.position = 'static';
            card.style.width = '100%';
            card.style.height = '100%';
            card.style.zIndex = 'auto';
            card.className = 'draggable bg-white border border-blue-400 rounded p-0.5 text-[9px] w-full h-full flex items-center justify-center text-center leading-tight';
            zone.appendChild(card);
        }

        // Touch Handlers
        let currentTouchCard = null;
        let startX, startY;

        function handleTouchStart(e) {
            if (e.target.classList.contains('draggable')) {
                currentTouchCard = e.target;
                const touch = e.touches[0];
                const rect = currentTouchCard.getBoundingClientRect();
                
                startX = touch.clientX - rect.left;
                startY = touch.clientY - rect.top;

                // Задаємо фіксовані розміри, щоб картка не "стискалася" під час відриву від сітки
                currentTouchCard.style.width = rect.width + 'px';
                currentTouchCard.style.height = rect.height + 'px';
                currentTouchCard.style.position = 'fixed';
                currentTouchCard.style.zIndex = '1000';
                currentTouchCard.classList.add('dragging-touch');
                
                moveAt(touch.clientX, touch.clientY);
            }
        }

        function handleTouchMove(e) {
            if (!currentTouchCard) return;
            e.preventDefault();
            const touch = e.touches[0];
            moveAt(touch.clientX, touch.clientY);

            // Визначаємо елемент під пальцем
            currentTouchCard.style.display = 'none'; // Тимчасово ховаємо, щоб побачити що під нею
            let elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            currentTouchCard.style.display = 'flex';

            if (!elemBelow) return;
            let zone = elemBelow.closest('.drop-zone');
            
            dropZones.forEach(z => z.classList.remove('active'));
            if (zone) zone.classList.add('active');
        }

        function handleTouchEnd(e) {
            if (!currentTouchCard) return;
            
            const touch = e.changedTouches[0];
            currentTouchCard.style.display = 'none';
            let elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            currentTouchCard.style.display = 'flex';

            let zone = elemBelow ? elemBelow.closest('.drop-zone') : null;

            if (zone) {
                placeCard(zone, currentTouchCard);
            } else {
                // Повернення картки в загальний контейнер
                currentTouchCard.style.position = 'static';
                currentTouchCard.style.width = 'auto';
                currentTouchCard.style.height = 'auto';
                currentTouchCard.className = 'draggable bg-white border-2 border-blue-200 p-2 md:p-3 rounded-xl shadow-sm text-xs md:text-sm text-center font-semibold';
                cardsContainer.appendChild(currentTouchCard);
            }

            dropZones.forEach(z => z.classList.remove('active'));
            currentTouchCard.classList.remove('dragging-touch');
            currentTouchCard = null;
        }

        function moveAt(pageX, pageY) {
            currentTouchCard.style.left = pageX - startX + 'px';
            currentTouchCard.style.top = pageY - startY + 'px';
        }

        checkBtn.addEventListener('click', () => {
            let correct = 0;
            let filled = 0;
            dropZones.forEach(zone => {
                const child = zone.querySelector('.draggable');
                if (child) {
                    filled++;
                    if (child.dataset.id === zone.dataset.id) {
                        child.classList.add('correct');
                        child.classList.remove('wrong');
                        correct++;
                    } else {
                        child.classList.add('wrong');
                        child.classList.remove('correct');
                    }
                }
            });

            if (filled === 0) {
                feedback.innerText = "Спочатку виконайте завдання!";
                feedback.className = "text-amber-500";
            } else if (correct === data.length) {
                feedback.innerText = "Відмінно! Все вірно 🌟";
                feedback.className = "text-green-600";
            } else {
                feedback.innerText = `Правильно: ${correct} з ${data.length}`;
                feedback.className = "text-blue-600";
            }
        });

        resetBtn.addEventListener('click', init);

        init();
    </script>
</body>
</html>
