<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аналіз графіка теплових процесів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
        }
        .drop-zone {
            transition: all 0.2s ease;
            border: 2px dashed #cbd5e1;
            background-color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.1;
            font-weight: bold;
            color: #94a3b8;
            z-index: 20;
        }
        .drop-zone.active-target {
            border-color: #3b82f6;
            background-color: #eff6ff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        .drop-zone.occupied {
            background-color: white;
            border-style: solid;
            border-color: #3b82f6;
            color: #1e293b;
            font-size: 9px;
            padding: 2px;
        }
        .selectable-card {
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .selectable-card.selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }
        .correct-zone {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong-zone {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        
        #orientation-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a;
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        @media (orientation: portrait) and (max-width: 768px) {
            #orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="orientation-warning">
        <i class="fa-solid fa-mobile-screen-button text-5xl mb-4 animate-bounce"></i>
        <h2 class="text-xl font-bold">Будь ласка, поверніть пристрій</h2>
        <p class="mt-2 text-slate-400">Для роботи з графіком використовуйте горизонтальну орієнтацію.</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white min-h-screen md:min-h-0 md:my-6 md:rounded-3xl shadow-2xl flex flex-col overflow-hidden">
        
        <header class="p-4 border-b bg-slate-50 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-extrabold text-slate-800">Аналіз графіка процесів</h1>
                <p class="text-xs text-slate-500">Натисніть на процес, потім на ділянку графіка</p>
            </div>
            <button id="reset-btn" class="w-10 h-10 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-200 hover:text-slate-600 transition-colors">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </header>

        <!-- Main Workspace -->
        <div class="p-2 flex flex-col items-center">
            
            <!-- Graph Visualization -->
            <div class="relative border rounded-2xl bg-slate-50 p-3 shadow-inner mb-4 select-none">
                <svg width="580" height="280" viewBox="0 0 600 300" class="max-w-full h-auto" id="main-svg">
                    <!-- Coordinate System -->
                    <line x1="50" y1="260" x2="560" y2="260" stroke="#334155" stroke-width="2" />
                    <line x1="50" y1="260" x2="50" y2="20" stroke="#334155" stroke-width="2" />
                    
                    <!-- Graph Line -->
                    <path d="M 50 260 L 100 90 L 180 90 L 280 40 L 400 90 L 500 90 L 550 260" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round" />
                    
                    <!-- Reference Points -->
                    <g fill="#1e293b" font-family="sans-serif" font-size="14" font-weight="bold">
                        <circle cx="100" cy="90" r="4" /><text x="92" y="80">A</text>
                        <circle cx="180" cy="90" r="4" /><text x="172" y="80">B</text>
                        <circle cx="280" cy="40" r="4" /><text x="272" y="30">C</text>
                        <circle cx="400" cy="90" r="4" /><text x="392" y="80">D</text>
                        <circle cx="500" cy="90" r="4" /><text x="492" y="80">E</text>
                    </g>
                </svg>

                <!-- Absolute Positioned Zones -->
                <div data-zone="1" class="drop-zone absolute rounded" style="left: 55px; top: 120px; width: 50px; height: 100px;">0-A</div>
                <div data-zone="2" class="drop-zone absolute rounded" style="left: 110px; top: 60px; width: 70px; height: 35px;">A-B</div>
                <div data-zone="3" class="drop-zone absolute rounded" style="left: 195px; top: 40px; width: 70px; height: 40px;">B-C</div>
                <div data-zone="4" class="drop-zone absolute rounded" style="left: 300px; top: 40px; width: 80px; height: 40px;">C-D</div>
                <div data-zone="5" class="drop-zone absolute rounded" style="left: 410px; top: 60px; width: 80px; height: 35px;">D-E</div>
                <div data-zone="6" class="drop-zone absolute rounded" style="left: 510px; top: 110px; width: 50px; height: 110px;">E...</div>
            </div>

            <!-- Pool of Cards -->
            <div id="cards-pool" class="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full max-w-4xl px-2 mb-4">
                <!-- Cards will be generated here -->
            </div>
        </div>

        <!-- Feedback & Footer -->
        <div class="mt-auto p-4 bg-slate-50 border-t flex items-center justify-between">
            <div id="feedback-msg" class="text-sm font-bold transition-all"></div>
            <button id="check-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95">
                Перевірити
            </button>
        </div>
    </div>

    <script>
        const initialData = [
            { id: "1", text: "Нагрівання льоду", label: "0-A" },
            { id: "2", text: "Плавлення льоду", label: "A-B" },
            { id: "3", text: "Нагрівання води", label: "B-C" },
            { id: "4", text: "Охолодження води", label: "C-D" },
            { id: "5", text: "Кристалізація", label: "D-E" },
            { id: "6", text: "Охолодження льоду", label: "E..." }
        ];

        let selectedId = null;
        let mapping = {}; // { zoneIndex: cardId }

        const cardsPool = document.getElementById('cards-pool');
        const zones = document.querySelectorAll('.drop-zone');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const feedback = document.getElementById('feedback-msg');

        function init() {
            mapping = {};
            selectedId = null;
            feedback.innerText = '';
            
            // Generate shuffled cards
            const shuffled = [...initialData].sort(() => Math.random() - 0.5);
            cardsPool.innerHTML = '';
            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.className = 'selectable-card bg-white border-2 border-slate-200 p-2.5 rounded-xl text-center text-xs font-bold shadow-sm flex items-center justify-center min-h-[50px]';
                card.innerText = item.text;
                card.dataset.id = item.id;
                card.onclick = () => handleCardSelection(item.id, card);
                cardsPool.appendChild(card);
            });

            // Reset zones
            zones.forEach(zone => {
                const zoneId = zone.dataset.zone;
                const originalLabel = initialData.find(d => d.id === zoneId).label;
                zone.innerText = originalLabel;
                zone.className = 'drop-zone absolute rounded';
                zone.onclick = () => handleZoneClick(zoneId, zone);
            });
        }

        function handleCardSelection(id, element) {
            // Toggle selection
            if (selectedId === id) {
                selectedId = null;
                element.classList.remove('selected');
                return;
            }

            selectedId = id;
            document.querySelectorAll('.selectable-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            
            // Highlight available zones
            zones.forEach(z => z.classList.add('active-target'));
            setTimeout(() => {
                zones.forEach(z => z.classList.remove('active-target'));
            }, 600);
        }

        function handleZoneClick(zoneId, zoneElement) {
            // Case 1: Returning a card from zone to pool
            if (!selectedId && mapping[zoneId]) {
                const cardId = mapping[zoneId];
                delete mapping[zoneId];
                updateCardVisibility(cardId, true);
                
                const originalLabel = initialData.find(d => d.id === zoneId).label;
                zoneElement.innerText = originalLabel;
                zoneElement.classList.remove('occupied', 'correct-zone', 'wrong-zone');
                return;
            }

            // Case 2: Placing a selected card
            if (selectedId) {
                // If zone occupied, return old card first
                if (mapping[zoneId]) {
                    updateCardVisibility(mapping[zoneId], true);
                }

                mapping[zoneId] = selectedId;
                const cardData = initialData.find(d => d.id === selectedId);
                
                zoneElement.innerText = cardData.text;
                zoneElement.classList.add('occupied');
                zoneElement.classList.remove('correct-zone', 'wrong-zone');

                updateCardVisibility(selectedId, false);
                selectedId = null;
                document.querySelectorAll('.selectable-card').forEach(c => c.classList.remove('selected'));
            }
        }

        function updateCardVisibility(id, isVisible) {
            const card = [...document.querySelectorAll('.selectable-card')].find(c => c.dataset.id === id);
            if (card) {
                if (isVisible) card.classList.remove('invisible', 'pointer-events-none');
                else card.classList.add('invisible', 'pointer-events-none');
            }
        }

        checkBtn.onclick = () => {
            const placedCount = Object.keys(mapping).length;
            if (placedCount === 0) {
                feedback.innerText = "Оберіть процеси!";
                feedback.className = "text-amber-500 font-bold";
                return;
            }

            let correct = 0;
            zones.forEach(zone => {
                const zoneId = zone.dataset.zone;
                const cardId = mapping[zoneId];

                if (cardId) {
                    zone.classList.remove('correct-zone', 'wrong-zone');
                    if (cardId === zoneId) {
                        zone.classList.add('correct-zone');
                        correct++;
                    } else {
                        zone.classList.add('wrong-zone');
                    }
                }
            });

            if (correct === initialData.length) {
                feedback.innerText = "Чудово! Все вірно ✨";
                feedback.className = "text-green-600 font-bold";
            } else {
                feedback.innerText = `Вірно: ${correct} з ${initialData.length}`;
                feedback.className = "text-blue-600 font-bold";
            }
        };

        resetBtn.onclick = init;

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
