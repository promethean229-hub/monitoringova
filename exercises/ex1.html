<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аналіз графіка теплових процесів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
        }
        .drop-zone {
            transition: all 0.2s ease;
            border: 2px dashed #cbd5e1;
            background-color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
        }
        .drop-zone.selected-target {
            border-color: #3b82f6;
            background-color: #eff6ff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        .card-item {
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .card-item.selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }
        .correct-zone {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            border-style: solid !important;
        }
        .wrong-zone {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            border-style: solid !important;
        }
        
        #orientation-warning {
            display: none;
        }
        @media (orientation: portrait) and (max-width: 768px) {
            #orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Orientation Warning -->
    <div id="orientation-warning" class="fixed inset-0 z-[100] bg-slate-900 text-white flex flex-col justify-center items-center text-center p-6">
        <i class="fa-solid fa-rotate text-5xl mb-4 animate-spin-slow"></i>
        <h2 class="text-xl font-bold">Поверніть пристрій</h2>
        <p class="mt-2 text-slate-400">Для роботи з графіком використовуйте горизонтальний режим (ландшафт).</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white min-h-screen md:min-h-0 md:my-6 md:rounded-3xl shadow-xl flex flex-col">
        <!-- Header -->
        <header class="p-4 border-b flex justify-between items-center bg-slate-50 md:rounded-t-3xl">
            <div>
                <h1 class="text-lg font-bold text-slate-800 leading-tight">Аналіз фазових переходів</h1>
                <p class="text-xs text-slate-500">Натисніть на текст, потім на зону на графіку</p>
            </div>
            <button id="reset-btn" class="p-2 text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </button>
        </header>

        <!-- Graph Area -->
        <div class="relative p-2 flex justify-center bg-white overflow-hidden">
            <div class="relative inline-block border rounded-xl bg-slate-50 p-2">
                <svg width="550" height="280" viewBox="0 0 600 300" class="max-w-full h-auto" id="main-svg">
                    <!-- Grid & Axes -->
                    <line x1="50" y1="260" x2="560" y2="260" stroke="#94a3b8" stroke-width="2" />
                    <line x1="50" y1="260" x2="50" y2="20" stroke="#94a3b8" stroke-width="2" />
                    
                    <!-- Graph Path -->
                    <path d="M 50 260 L 100 90 L 180 90 L 280 40 L 400 90 L 500 90 L 550 260" fill="none" stroke="#3b82f6" stroke-width="3" />
                    
                    <!-- Labels & Points -->
                    <g fill="#475569" font-size="14" font-weight="bold">
                        <circle cx="100" cy="90" r="4" /><text x="90" y="80">A</text>
                        <circle cx="180" cy="90" r="4" /><text x="175" y="80">B</text>
                        <circle cx="280" cy="40" r="4" /><text x="275" y="30">C</text>
                        <circle cx="400" cy="90" r="4" /><text x="395" y="80">D</text>
                        <circle cx="500" cy="90" r="4" /><text x="495" y="80">E</text>
                    </g>
                </svg>

                <!-- Responsive Drop Zones (Transparent layers over SVG) -->
                <div data-zone="1" class="drop-zone absolute rounded flex items-center justify-center text-[10px] font-bold p-1 text-slate-400" style="left: 55px; top: 120px; width: 50px; height: 100px;">0-A</div>
                <div data-zone="2" class="drop-zone absolute rounded flex items-center justify-center text-[10px] font-bold p-1 text-slate-400" style="left: 110px; top: 60px; width: 70px; height: 35px;">A-B</div>
                <div data-zone="3" class="drop-zone absolute rounded flex items-center justify-center text-[10px] font-bold p-1 text-slate-400" style="left: 195px; top: 40px; width: 70px; height: 40px;">B-C</div>
                <div data-zone="4" class="drop-zone absolute rounded flex items-center justify-center text-[10px] font-bold p-1 text-slate-400" style="left: 300px; top: 40px; width: 80px; height: 40px;">C-D</div>
                <div data-zone="5" class="drop-zone absolute rounded flex items-center justify-center text-[10px] font-bold p-1 text-slate-400" style="left: 410px; top: 60px; width: 80px; height: 35px;">D-E</div>
                <div data-zone="6" class="drop-zone absolute rounded flex items-center justify-center text-[10px] font-bold p-1 text-slate-400" style="left: 510px; top: 110px; width: 50px; height: 110px;">E...</div>
            </div>
        </div>

        <!-- Cards Selector -->
        <div class="p-4 flex-grow">
            <div id="cards-container" class="grid grid-cols-2 gap-2">
                <!-- Cards injected here -->
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="p-4 bg-slate-50 border-t flex items-center justify-between md:rounded-b-3xl">
            <div id="feedback" class="text-sm font-bold"></div>
            <button id="check-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
                Перевірити
            </button>
        </div>
    </div>

    <script>
        const exercisesData = [
            { id: "1", text: "Нагрівання льоду" },
            { id: "2", text: "Плавлення льоду" },
            { id: "3", text: "Нагрівання води" },
            { id: "4", text: "Охолодження води" },
            { id: "5", text: "Кристалізація" },
            { id: "6", text: "Охолодження льоду" }
        ];

        let selectedDeviceId = null;
        let placements = {}; // zoneId: deviceId

        const cardsContainer = document.getElementById('cards-container');
        const dropZones = document.querySelectorAll('.drop-zone');
        const feedback = document.getElementById('feedback');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');

        function init() {
            placements = {};
            selectedDeviceId = null;
            feedback.innerText = '';
            
            // Render cards
            const shuffled = [...exercisesData].sort(() => Math.random() - 0.5);
            cardsContainer.innerHTML = '';
            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card-item bg-white border-2 border-slate-200 p-3 rounded-xl text-center text-xs font-bold shadow-sm';
                card.innerText = item.text;
                card.dataset.id = item.id;
                card.onclick = () => selectCard(item.id, card);
                cardsContainer.appendChild(card);
            });

            // Reset zones
            dropZones.forEach(zone => {
                zone.className = 'drop-zone absolute rounded flex items-center justify-center text-[9px] font-bold p-1 text-slate-400 text-center leading-tight';
                const zoneId = zone.dataset.zone;
                const originalLabel = getOriginalLabel(zoneId);
                zone.innerText = originalLabel;
                zone.onclick = () => handleZoneClick(zoneId, zone);
            });
        }

        function getOriginalLabel(id) {
            const labels = { "1":"0-A", "2":"A-B", "3":"B-C", "4":"C-D", "5":"D-E", "6":"E..." };
            return labels[id];
        }

        function selectCard(id, element) {
            // Unselect previous
            document.querySelectorAll('.card-item').forEach(c => c.classList.remove('selected'));
            
            if (selectedDeviceId === id) {
                selectedDeviceId = null;
            } else {
                selectedDeviceId = id;
                element.classList.add('selected');
            }
        }

        function handleZoneClick(zoneId, zoneElement) {
            if (!selectedDeviceId) {
                // If clicking an occupied zone without a selection, return card to pool
                if (placements[zoneId]) {
                    const devId = placements[zoneId];
                    delete placements[zoneId];
                    showCardInPool(devId);
                    zoneElement.innerText = getOriginalLabel(zoneId);
                    zoneElement.classList.remove('bg-white', 'text-slate-800', 'border-solid', 'border-blue-200');
                }
                return;
            }

            // If a card is selected, place it
            const device = exercisesData.find(d => d.id === selectedDeviceId);
            
            // If zone had another card, return it to pool
            if (placements[zoneId]) {
                showCardInPool(placements[zoneId]);
            }

            placements[zoneId] = selectedDeviceId;
            zoneElement.innerText = device.text;
            zoneElement.classList.add('bg-white', 'text-slate-800', 'border-solid', 'border-blue-200');
            
            hideCardFromPool(selectedDeviceId);
            selectedDeviceId = null;
            document.querySelectorAll('.card-item').forEach(c => c.classList.remove('selected'));
        }

        function hideCardFromPool(id) {
            const card = [...document.querySelectorAll('.card-item')].find(c => c.dataset.id === id);
            if (card) card.classList.add('hidden');
        }

        function showCardInPool(id) {
            const card = [...document.querySelectorAll('.card-item')].find(c => c.dataset.id === id);
            if (card) card.classList.remove('hidden');
        }

        checkBtn.onclick = () => {
            let correctCount = 0;
            const total = exercisesData.length;

            dropZones.forEach(zone => {
                const zoneId = zone.dataset.zone;
                const placedId = placements[zoneId];

                zone.classList.remove('correct-zone', 'wrong-zone');
                
                if (placedId) {
                    if (placedId === zoneId) {
                        zone.classList.add('correct-zone');
                        correctCount++;
                    } else {
                        zone.classList.add('wrong-zone');
                    }
                }
            });

            if (Object.keys(placements).length < total) {
                feedback.innerText = "Заповніть всі зони!";
                feedback.className = "text-amber-600 text-sm font-bold";
            } else if (correctCount === total) {
                feedback.innerText = "Відмінно! Все вірно.";
                feedback.className = "text-green-600 text-sm font-bold";
            } else {
                feedback.innerText = `Правильно: ${correctCount} з ${total}`;
                feedback.className = "text-blue-600 text-sm font-bold";
            }
        };

        resetBtn.onclick = init;

        init();
    </script>
</body>
</html>
